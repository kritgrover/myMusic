name: music_downloader
description: A Flutter app for downloading and playing music from YouTube
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  just_audio: ^0.9.36
  # Windows/Linux playback backend for just_audio (no native impl otherwise)
  just_audio_media_kit: ^2.0.6
  media_kit_libs_windows_audio: ^1.0.4
  path_provider: ^2.1.1
  permission_handler: ^11.1.0
  cupertino_icons: ^1.0.6
  shared_preferences: ^2.2.2
  image_picker: ^1.0.7
  scrollable_positioned_list: ^0.3.2
  # Cross-platform file picker (CSV upload) — replaces web-only dart:html
  file_picker: ^8.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true


